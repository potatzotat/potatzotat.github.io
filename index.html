<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Arcade Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">ArcadeZone</div>
        <input type="text" id="searchBar" placeholder="Search games...">
    </header>

    <main class="container">
        <h2 id="gridTitle" class="section-title">Trending Games</h2>
        
        <div id="gameGrid" class="game-grid">
            </div>

        <div id="gamePlayer" class="hidden">
            <button id="closeGameBtn" class="close-btn">← Back to Arcade</button>
            <div class="iframe-container">
                <iframe id="gameFrame" src="" frameborder="0" scrolling="no" allowfullscreen></iframe>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
